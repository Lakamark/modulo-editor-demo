<!doctype html>
<html lang="en">
  <head>
    <title>Modulo Editor</title>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>

  <div class="page-wrapper">
    <section>
      <h2>Basic</h2>
      <section>
        <h2>Basic</h2>

        <div id="demo-basic">
          <div data-mo-editor>
            <div data-mo-editor-input contenteditable="true"></div>
            <div data-mo-editor-preview></div>
            <label for="content" class="src-only"></label>
            <textarea data-mo-editor-textarea name="content" id="content"></textarea>
          </div>

          <div class="demo-actions">
            <button data-action="bold">Bold</button>
            <button data-action="italic">Italic</button>
          </div>
        </div>
      </section>
    </section>

    <section>
      <h2>Markdown</h2>
      <div id="demo-markdown"></div>
    </section>

    <section>
      <h2>Commands</h2>
      <div id="demo-commands"></div>
    </section>

    <section>
      <h2>Plugins</h2>
      <div id="demo-plugins"></div>
    </section>
  </div>
  </body>
</html>
